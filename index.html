<!doctype html>
<html lang="en" class="bg-ink-950">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Workouts" />
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Workouts</title>
  </head>
  <body class="bg-ink-950 text-white">
    <div id="root">
      <div
        id="boot-shell"
        style="
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 12px;
          color: #fff;
          background: #0a0a0a;
          font-family: system-ui, -apple-system, sans-serif;
          padding: 24px;
          text-align: center;
        "
      >
        <div style="font-family: 'Fraunces', serif; font-size: 28px; font-style: italic; color: #ff6b6b;">
          Workouts
        </div>
        <div id="boot-status" style="font-size: 13px; color: #8a8a8a;">Loading…</div>
        <div id="boot-error" style="display:none; max-width: 520px; font-size: 12px; white-space: pre-wrap; color: #ff9a9a; background: #1a0a0a; padding: 12px; border-radius: 8px; text-align: left;"></div>
      </div>
    </div>
    <script>
      (function () {
        // Self-heal: unregister any stale service worker from a previous deploy
        // whose precache points at now-deleted asset hashes, then wipe its
        // caches. The self-destroying SW generated by vite-plugin-pwa handles
        // this too, but this inline script runs even if the old SW tries to
        // intercept the new one.
        if ('serviceWorker' in navigator && navigator.serviceWorker.getRegistrations) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister(); });
          });
        }
        if (window.caches && caches.keys) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) { caches.delete(k); });
          });
        }
        function showErr(msg) {
          var el = document.getElementById('boot-error');
          if (!el) return;
          el.style.display = 'block';
          el.textContent = msg;
        }
        window.addEventListener('error', function (e) {
          showErr('Load error: ' + (e.message || e.filename || 'unknown'));
        });
        window.addEventListener('unhandledrejection', function (e) {
          showErr('Promise error: ' + (e.reason && (e.reason.stack || e.reason.message || String(e.reason))));
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
